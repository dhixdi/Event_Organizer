runtime: nodejs22

env: standard

instance_class: F1

# Serve static files hasil build React
handlers:
  # PERUBAHAN DI SINI: Mengubah 'static' menjadi 'assets' agar sesuai dengan Vite
  - url: /assets
    static_dir: dist/assets
    secure: always
    http_headers:
      Cache-Control: "public, max-age=31536000, immutable"

  # favicon, manifest, dll di root
  - url: /(.*\.(ico|png|svg|json|txt|webmanifest))
    static_files: dist/\1
    upload: dist/.*\.(ico|png|svg|json|txt|webmanifest)
    secure: always

  # Semua route lain → index.html (React Router SPA)
  - url: /.*
    static_files: dist/index.html
    upload: dist/index.html
    secure: always
    http_headers:
      Cache-Control: "no-cache, no-store, must-revalidate"

# Environment variables untuk build (override di .env atau CI)
env_variables:
  NODE_ENV: "production"